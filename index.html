<!DOCTYPE html>
<html>
<head>
 <title>GoExplore</title>
<style type="text/css">
/* <!-- initialises style content explicitly as css --> */

  header 
  {
     width: 100%;
     height: 100vh;
     font-family: sans-serif;
  }
  body 
  {
  background-image: linear-gradient(rgba(0,0,0,0.8),rgba(0,0,0,0.2)),url('/cottage.jpg');
  /* <!-- rgba stands for red,green,blue,alpha which is opacity set to 80% and 20% --> */
  background-repeat: no-repeat;
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  }
  nav 
  {
    width: 100%;
    height:100px;
    color: white;
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .logo
  {
    font-size: 1.5em;
    letter-spacing: 2px;
  } 
  .menu a
  {
    text-decoration: none;
    color: white;
    padding: 10px 20px;
    font-size: 20px;
    position: relative;
  }
  .menu a:before
  {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 0%;
    height: 100%;
    border-bottom: 2px solid #CD5909;
    transition: width 0.4s linear; 
  }
  .menu a:hover:before
  {
    width: 90%;
  }
  .signup a
  {
     text-decoration: none;
     color: white;
     padding: 10px 20px;
     font-size: 20px;
     background: #CD5909;
     border-radius: 3px;
     transition: width 0.4s;
  }
  .signup a:hover
  {
    background: transparent;
    border: 1px solid #CD5909;
  }
  .headtxt
  {
    max-width: 800px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
    color:white;
  }
  .headtxt span
  {
    font-size: 1.5em;
    letter-spacing: 3px;
  }
  .headtxt h1
  {
    font-size: 3em;
    
  }
  .headtxt a
  {
    text-decoration: none;
    background: #CD5909;
    color: white;
    padding: 10px 20px;
    letter-spacing: 5px;
    transition: 0.4s;
  }
  .headtxt a:hover
  {
    background: transparent;
    border: 1px solid #CD5909;
  }

</style>
</head>

<body>
<header>
     <nav>
       <div class="logo"> 
           Explore-Logo
       </div>
       <div class="menu">
           <a href="index.html">Home</a>
           <a href="html/about.html">About</a> 
           <a href="html/tripplan.html">Trip Plan</a>
           <a href="html/journal.html">Journal</a>
           <a href="html/contactus.html">Contact</a>
           <a href="html/guides.html">Guides</a>
       </div>
       <div class="signup">
       <a href="html/signupform.html">Signup</a>
       </div>
     </nav>
     <section class="headtxt">
       <span>Welcome To</span>
       <h1> Holistic Travel & Trip Management</h1>

       <br>
       <a href="#">Get Started</a>
     </section>
</header>
</body>
</html>
